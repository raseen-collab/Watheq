<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%230E3A37'/%3E%3Ctext x='32' y='45' font-size='38' text-anchor='middle' fill='%23E7C877' font-weight='bold' font-family='Arial'%3E%D9%88%3C/text%3E%3C/svg%3E">
<title>وثيق — لوحة التحكم</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Readex+Pro:wght@400;500;600;700&family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0B211F; --deep:#0E3A37; --deep-2:#0A2C2A;
    --paper:#FBF8F1; --paper-2:#F3EEE2; --card:#FFFFFF;
    --line:#E4DDCD; --muted:#5C6B67;
    --gold:#B8791F; --gold-ink:#8a5a11; --gold-soft:#E7C877;
    --paid:#1E9E6A; --late:#D0453F;
    --paid-bg:#E6F4EC; --late-bg:#FBE9E7; --amber-bg:#FBF1DF;
    --radius:14px;
    --shadow:0 1px 2px rgba(11,33,31,.04), 0 10px 26px -16px rgba(11,33,31,.28);
    --shadow-lg:0 24px 60px -28px rgba(11,33,31,.42);
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--paper);color:var(--ink);font-family:"IBM Plex Sans Arabic",system-ui,sans-serif;line-height:1.6;-webkit-font-smoothing:antialiased}
  h1,h2,h3{font-family:"Readex Pro","IBM Plex Sans Arabic",sans-serif}
  button{font-family:inherit;cursor:pointer}
  input,select{font-family:inherit}
  a{color:inherit;text-decoration:none}
  .wrap{max-width:1060px;margin:0 auto;padding:0 18px}

  /* ===== شريط علوي ===== */
  .top{background:var(--deep);color:#EAF1EE}
  .top .row{display:flex;align-items:center;justify-content:space-between;gap:14px;min-height:64px;flex-wrap:wrap;padding:10px 0}
  .brand{display:flex;align-items:center;gap:10px;font-family:"Readex Pro";font-weight:700;font-size:1.2rem}
  .seal{width:32px;height:32px;border-radius:9px;background:linear-gradient(150deg,#12403c,#0A2C2A);display:grid;place-items:center;box-shadow:inset 0 0 0 1.5px rgba(231,200,119,.4);flex:none}
  .seal::after{content:"و";color:var(--gold-soft);font-family:"Readex Pro";font-weight:700}
  .brand small{display:block;font-family:"IBM Plex Sans Arabic";font-weight:400;font-size:.7rem;color:#9FB8B3;margin-top:-2px}

  /* مبدّل الوضع */
  .modeseg{display:inline-flex;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.16);border-radius:12px;padding:4px}
  .modeseg button{border:0;background:transparent;color:#CFE0DB;font-weight:600;font-size:.9rem;padding:8px 16px;border-radius:9px;transition:background .18s ease,color .18s ease}
  .modeseg button.on{background:var(--gold-soft);color:#0A2C2A}

  /* ===== أزرار ===== */
  .btn{display:inline-flex;align-items:center;gap:7px;font-weight:600;font-size:.9rem;padding:9px 16px;border-radius:10px;border:1px solid transparent;transition:transform .12s ease, background .18s ease, box-shadow .2s ease;white-space:nowrap}
  .btn:active{transform:translateY(1px)}
  .btn-primary{background:var(--deep);color:#F6F1E4}
  .btn-primary:hover{background:var(--deep-2)}
  .btn-gold{background:var(--gold);color:#fff}
  .btn-gold:hover{background:var(--gold-ink)}
  .btn-ghost{background:var(--card);color:var(--deep);border-color:var(--line)}
  .btn-ghost:hover{background:var(--paper-2)}
  .btn-wa{background:#1FA855;color:#fff}
  .btn-wa:hover{background:#18944a}
  .btn-sm{padding:6px 11px;font-size:.8rem;border-radius:8px}
  .btn-icon{padding:6px 9px;font-size:.85rem;background:transparent;border:1px solid var(--line);color:var(--muted);border-radius:8px}
  .btn-icon:hover{background:var(--paper-2);color:var(--late)}

  main{padding:20px 0 64px}

  /* شريط أدوات (اختيار الكيان) */
  .toolbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:20px}
  .toolbar .sel{background:var(--card);color:var(--deep);border:1px solid var(--line);border-radius:10px;padding:9px 13px;font-size:.92rem;font-weight:600;max-width:260px}
  .toolbar .title{font-family:"Readex Pro";font-weight:700;font-size:1.25rem;color:var(--deep);margin-inline-end:auto}
  .toolbar .title small{display:block;font-family:"IBM Plex Sans Arabic";font-weight:400;font-size:.8rem;color:var(--muted)}

  /* تنبيهات */
  .alert{display:flex;align-items:center;gap:12px;flex-wrap:wrap;border-radius:12px;padding:13px 16px;font-size:.94rem;font-weight:500;margin-bottom:18px}
  .alert.amber{background:var(--amber-bg);border:1px solid rgba(184,121,31,.3);color:var(--gold-ink)}
  .alert.red{background:var(--late-bg);border:1px solid rgba(208,69,63,.3);color:#8f2b26}
  .alert b{font-weight:700}
  .alert .ico{font-size:1.15rem}
  .alert .btn{margin-inline-start:auto;flex:none}

  /* إحصاءات */
  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow)}
  .stat .v{font-family:"Readex Pro";font-weight:700;font-size:1.85rem;color:var(--deep);line-height:1}
  .stat .v.warn{color:var(--late)}
  .stat .v.ok{color:var(--paid)}
  .stat .lbl{color:var(--muted);font-size:.83rem;margin-top:7px}

  /* لوحات */
  .grid2{display:grid;grid-template-columns:1.6fr 1fr;gap:20px;align-items:start}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
  .panel-h{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:15px 18px;border-bottom:1px solid var(--line)}
  .panel-h h2{margin:0;font-size:1.05rem;font-weight:600}
  .panel-h .count{color:var(--muted);font-size:.82rem;font-weight:400}
  .panel-b{padding:14px 18px 18px}

  /* صف إضافة (جمعيات) */
  .addrow{display:grid;grid-template-columns:1.4fr .7fr 1fr auto;gap:8px;margin-bottom:14px}
  .fld{background:var(--paper);border:1px solid var(--line);border-radius:9px;padding:9px 11px;font-size:.88rem;width:100%;color:var(--ink)}
  .fld:focus{outline:2px solid var(--gold-soft);outline-offset:1px}

  /* صف كيان (مالك/مستأجر) */
  .row-item{display:flex;align-items:center;gap:12px;padding:11px 12px;border:1px solid var(--line);border-radius:11px;margin-bottom:9px;background:var(--paper)}
  .row-item .av{width:36px;height:36px;border-radius:9px;background:var(--paper-2);display:grid;place-items:center;font-weight:600;color:var(--deep);flex:none}
  .row-item .meta{flex:1;min-width:0}
  .row-item .meta .n{font-weight:600;font-size:.94rem}
  .row-item .meta .u{color:var(--muted);font-size:.78rem}
  .pay{display:inline-flex;align-items:center;gap:6px;font-size:.8rem;font-weight:600;padding:5px 10px;border-radius:8px;white-space:nowrap}
  .pay .d{width:7px;height:7px;border-radius:50%}
  .pay.ok{background:var(--paid-bg);color:#137a50}.pay.ok .d{background:var(--paid)}
  .pay.late{background:var(--late-bg);color:#a5322c}.pay.late .d{background:var(--late)}
  .pay.soon{background:var(--amber-bg);color:var(--gold-ink)}.pay.soon .d{background:var(--gold)}
  .row-item .acts{display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end}

  /* ملاحظات */
  .note{padding:11px 0;border-bottom:1px dashed var(--line);font-size:.9rem;display:flex;gap:10px}
  .note:last-child{border-bottom:0}
  .note .dt{color:var(--gold-ink);font-weight:600;font-size:.74rem;flex:none;width:74px}
  .note .tx{color:#33413d;flex:1}
  .note .x{color:var(--muted);cursor:pointer;font-size:.9rem;opacity:.5}
  .note .x:hover{opacity:1;color:var(--late)}
  .note-add{display:flex;gap:8px;margin-bottom:14px}
  .empty{text-align:center;color:var(--muted);padding:26px 10px;font-size:.9rem}

  /* onboarding + modal */
  .overlay{position:fixed;inset:0;background:rgba(11,33,31,.5);backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px);display:grid;place-items:center;padding:18px;z-index:100}
  .modal{background:var(--card);border-radius:18px;box-shadow:var(--shadow-lg);width:100%;max-width:480px;padding:26px;max-height:90vh;overflow:auto}
  .modal h2{margin:0 0 4px;font-size:1.3rem;color:var(--deep)}
  .modal p.sub{margin:0 0 18px;color:var(--muted);font-size:.9rem}
  .field{margin-bottom:13px}
  .field.two{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .field label{display:block;font-size:.85rem;font-weight:600;margin-bottom:6px;color:var(--ink)}
  .modal-actions{display:flex;gap:10px;margin-top:20px}
  .modal-actions .btn{flex:1;justify-content:center}
  .link-btn{background:none;border:0;color:var(--gold-ink);font-weight:600;font-size:.86rem;text-decoration:underline;padding:6px}
  .onboard{max-width:520px;margin:44px auto;background:var(--card);border:1px solid var(--line);border-radius:20px;box-shadow:var(--shadow-lg);padding:34px;text-align:center}
  .onboard .seal{width:52px;height:52px;margin:0 auto 16px;font-size:1.3rem}
  .onboard h2{margin:0 0 8px;color:var(--deep)}
  .onboard p{color:var(--muted);margin:0 0 22px}

  /* نافذة الإنذار */
  .doc{white-space:pre-wrap;border:1px solid var(--line);background:var(--paper);border-radius:12px;padding:16px;font-size:.9rem;line-height:1.9;color:var(--ink);max-height:52vh;overflow:auto}
  .disc{font-size:.76rem;color:var(--gold-ink);margin:2px 0 12px}

  .foot{text-align:center;color:var(--muted);font-size:.8rem;margin-top:34px}
  .cloudbar{background:var(--amber-bg);border-bottom:1px solid rgba(184,121,31,.25);color:var(--gold-ink);font-size:.85rem;text-align:center;padding:8px 14px}
  .cloudbar a{color:var(--gold-ink);font-weight:700;text-decoration:underline}
  .badge-soon{display:inline-block;background:var(--amber-bg);color:var(--gold-ink);font-size:.72rem;font-weight:700;padding:3px 10px;border-radius:999px;border:1px solid rgba(184,121,31,.3)}

  @media(max-width:820px){
    .stats{grid-template-columns:1fr 1fr}
    .grid2{grid-template-columns:1fr}
    .addrow{grid-template-columns:1fr 1fr}
    .brand small{display:none}
    .toolbar .title{width:100%;margin-inline-end:0}
    .field.two{grid-template-columns:1fr}
  }
</style>
</head>
<body>

<header class="top">
  <div class="wrap row">
    <a href="index.html" class="brand" title="العودة إلى الموقع"><span class="seal"></span><div>وثيق<small id="brandSub">لوحة التحكم</small></div></a>
    <div class="modeseg" id="modeSeg">
      <button data-mode="association">جمعيات الملاك</button>
      <button data-mode="property">إدارة الأملاك</button>
    </div>
  </div>
</header>

<div class="cloudbar">معاينة سريعة — بياناتك هنا محفوظة على هذا الجهاز فقط. <a href="https://watheq-app.vercel.app" target="_blank" rel="noreferrer">ابدأ تجربة ٣٠ يومًا مجانًا لحفظها سحابيًّا ←</a></div>

<main class="wrap" id="app"></main>

<script>
/* ============================ التخزين ============================ */
const KEY = "watheq_app_v2";
const mem = {};
const store = {
  async get(k){ if(window.storage){try{return await window.storage.get(k)}catch(e){return null}} try{const v=localStorage.getItem(k);return v?{key:k,value:v}:null}catch(e){return mem[k]?{key:k,value:mem[k]}:null} },
  async set(k,v){ if(window.storage){try{return await window.storage.set(k,v)}catch(e){}return} try{localStorage.setItem(k,v)}catch(e){mem[k]=v} }
};

let state = {
  mode: "association",
  associations: [], activeAssoc: null,
  properties: [], activeProp: null,
  ui: { modal: null, doc: null }
};

async function load(){
  const r = await store.get(KEY);
  if(r&&r.value){ try{ const s=JSON.parse(r.value); Object.assign(state, s); state.ui={modal:null,doc:null}; }catch(e){} }
  if(state.associations.length && !assoc()) state.activeAssoc=state.associations[0].id;
  if(state.properties.length && !prop()) state.activeProp=state.properties[0].id;
}
async function save(){
  const {ui, ...persist} = state;
  await store.set(KEY, JSON.stringify(persist));
}
async function commit(){ await save(); render(); }

/* ============================ أدوات ============================ */
const uid=()=>Math.random().toString(36).slice(2,9);
const esc=s=>String(s??"").replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const money=n=>(Number(n)||0).toLocaleString('en-US');
const today=()=>new Date().toISOString().slice(0,10);
function daysLeft(d){ if(!d) return null; return Math.ceil((new Date(d)-new Date(new Date().toDateString()))/86400000); }
function waNum(p){ p=(p||'').replace(/\D/g,''); if(!p)return''; if(p.startsWith('966'))return p; if(p.startsWith('0'))return'966'+p.slice(1); if(p.length===9)return'966'+p; return p; }
function openWa(phone,msg){ window.open(`https://wa.me/${waNum(phone)}?text=${encodeURIComponent(msg)}`,'_blank'); }

/* حساب أيام حتى استحقاق الشهر القادم (يوم 1 من كل شهر افتراضيًّا) */
function daysUntilDue(dueDay){
  dueDay=dueDay||1;
  const now=new Date(), y=now.getFullYear(), m=now.getMonth();
  let next=new Date(y,m,dueDay);
  if(next<=now) next=new Date(y,m+1,dueDay);
  return Math.ceil((next-now)/86400000);
}

/* مؤشّر ثلاثي: أحمر (متأخر) / أصفر (اقترب الموعد ≤7 أيام) / أخضر (منتظم) */
function statusBadge(monthsLate, dueDay){
  if(monthsLate>0) return `<span class="pay late"><span class="d"></span> متأخر ${monthsLate>1?monthsLate+' أشهر':'شهر'}</span>`;
  const d=daysUntilDue(dueDay);
  if(d<=7) return `<span class="pay soon"><span class="d"></span> يستحق خلال ${d} يوم</span>`;
  return `<span class="pay ok"><span class="d"></span> منتظم</span>`;
}
const WATHEQ_WA="966596300591";

const assoc=()=>state.associations.find(a=>a.id===state.activeAssoc);
const prop =()=>state.properties.find(p=>p.id===state.activeProp);

/* ============================ أفعال مشتركة ============================ */
function switchMode(m){ state.mode=m; state.ui.modal=null; commit(); }

/* ============================ وضع جمعيات الملاك ============================ */
function assocAdd(a){ state.associations.push(a); state.activeAssoc=a.id; state.ui.modal=null; commit(); }
function assocUpdate(patch){ Object.assign(assoc(),patch); state.ui.modal=null; commit(); }
function assocDelete(){ if(!confirm('حذف هذه الجمعية وكل بياناتها؟'))return; state.associations=state.associations.filter(a=>a.id!==state.activeAssoc); state.activeAssoc=state.associations[0]?.id||null; state.ui.modal=null; commit(); }
function ownerAdd(){ const n=document.getElementById('oName').value.trim(); if(!n){document.getElementById('oName').focus();return;} assoc().owners.push({id:uid(),name:n,unit:document.getElementById('oUnit').value.trim(),phone:document.getElementById('oPhone').value.trim(),monthsLate:0,lastPaid:null}); commit(); }
function ownerPay(id){ const o=assoc().owners.find(x=>x.id===id); o.monthsLate=Math.max(0,o.monthsLate-1); o.lastPaid=today(); assoc().fundBalance=(assoc().fundBalance||0)+Number(assoc().fee||0); commit(); }
function ownerDue(id){ assoc().owners.find(x=>x.id===id).monthsLate++; commit(); }
function ownerDel(id){ if(!confirm('حذف هذا المالك؟'))return; assoc().owners=assoc().owners.filter(x=>x.id!==id); commit(); }
function ownerRemind(id){
  const a=assoc(),o=a.owners.find(x=>x.id===id),fee=Number(a.fee||0),total=o.monthsLate*fee;
  const msg=o.monthsLate<=1
   ? `مساء الخير ${o.name} 🌿\nتذكير ودّي بأن اشتراك الصيانة${fee?` بمبلغ ${money(fee)} ريال`:''} أصبح مستحقًا. نقدّر لك المبادرة بالسداد. شكرًا لتعاونك.\n— إدارة الجمعية`
   : `تحية طيبة ${o.name}،\nنودّ تذكيركم بأن اشتراكاتكم المتأخرة (${o.monthsLate} أشهر)${total?` بمبلغ ${money(total)} ريال`:''} لا تزال غير مسدّدة. نأمل سدادها حرصًا على حقوق بقية الملاك. — إدارة الجمعية`;
  openWa(o.phone,msg);
}
function assocRenew(){ const a=assoc(),dl=daysLeft(a.certExpiry); openWa(WATHEQ_WA,`مرحبًا، أرغب بتجهيز مستندات تجديد شهادة جمعيتنا عبر وثيق.\nالجمعية: ${a.name}\nتاريخ انتهاء الشهادة: ${a.certExpiry||'غير محدد'}${dl!==null?` (خلال ${dl} يومًا)`:''}\nالمطلوب: محضر التجديد + الموازنة.`); }
function ownerNotice(id){ const a=assoc(),o=a.owners.find(x=>x.id===id),total=o.monthsLate*Number(a.fee||0); openWa(WATHEQ_WA,`مرحبًا، أرغب بإصدار إنذار سداد رسمي عبر وثيق.\nالجمعية: ${a.name}\nمالك الوحدة: ${o.unit||'—'} (${o.name})\nالمتأخرات: ${o.monthsLate} أشهر${total?` بمبلغ ${money(total)} ريال`:''}.`); }
function assocNote(){ const el=document.getElementById('aNote'),t=el.value.trim(); if(!t)return; assoc().notes.unshift({id:uid(),date:today(),text:t}); commit(); }
function assocNoteDel(id){ assoc().notes=assoc().notes.filter(x=>x.id!==id); commit(); }

/* ============================ وضع إدارة الأملاك ============================ */
function propAdd(p){ state.properties.push(p); state.activeProp=p.id; state.ui.modal=null; commit(); }
function propUpdate(patch){ Object.assign(prop(),patch); state.ui.modal=null; commit(); }
function propDelete(){ if(!confirm('حذف هذا العقار وكل مستأجريه؟'))return; state.properties=state.properties.filter(p=>p.id!==state.activeProp); state.activeProp=state.properties[0]?.id||null; state.ui.modal=null; commit(); }
function tenantSave(){
  const g=id=>document.getElementById(id).value.trim();
  const name=g('tName'); if(!name){document.getElementById('tName').focus();return;}
  const rent=Number(g('tRent'))||0;
  const data={ name, unit:g('tUnit'), phone:g('tPhone'), nationalId:g('tNid'), rentAmount:rent, contractStart:g('tStart'), contractEnd:g('tEnd') };
  const editId=state.ui.modal&&state.ui.modal.editTenant;
  if(editId){ const t=prop().tenants.find(x=>x.id===editId); Object.assign(t,data); }
  else prop().tenants.push({ id:uid(), monthsLate:0, lastPaid:null, ...data });
  state.ui.modal=null; commit();
}
function tenantPay(id){ const t=prop().tenants.find(x=>x.id===id); t.monthsLate=Math.max(0,t.monthsLate-1); t.lastPaid=today(); prop().collected=(prop().collected||0)+Number(t.rentAmount||0); commit(); }
function tenantDue(id){ prop().tenants.find(x=>x.id===id).monthsLate++; commit(); }
function tenantDel(id){ if(!confirm('حذف هذا المستأجر؟'))return; prop().tenants=prop().tenants.filter(x=>x.id!==id); commit(); }
function tenantRemind(id){
  const p=prop(),t=p.tenants.find(x=>x.id===id),rent=Number(t.rentAmount||0),total=t.monthsLate*rent,mgr=p.manager||'إدارة الأملاك';
  const msg=t.monthsLate<=1
   ? `مساء الخير ${t.name} 🌿\nتذكير ودّي بأن إيجار الوحدة (${t.unit||'—'}) بعقار ${p.name}${rent?` وقدره ${money(rent)} ريال`:''} أصبح مستحقًا. نأمل السداد في موعده. شكرًا لتعاونكم.\n— ${mgr}`
   : `تحية طيبة ${t.name}،\nنفيدكم بأن الأجرة المتأخرة (${t.monthsLate} أشهر)${total?` بمبلغ ${money(total)} ريال`:''} عن الوحدة (${t.unit||'—'}) بعقار ${p.name} لم تُسدَّد. نأمل المبادرة بالسداد خلال أيام تفاديًا للإجراءات النظامية وفق عقد الإيجار الموحّد.\n— ${mgr}`;
  openWa(t.phone,msg);
}
function tenantNotice(id){
  const p=prop(),t=p.tenants.find(x=>x.id===id),rent=Number(t.rentAmount||0),total=(t.monthsLate||1)*rent,mgr=p.manager||'إدارة الأملاك';
  const body=
`إنذار نهائي بسداد الأجرة المتأخرة
التاريخ: ${today()}

من: ${mgr} — بصفته المؤجر/الوكيل عن مالك العقار.
إلى: المستأجر / ${t.name}${t.nationalId?`، هوية/إقامة رقم (${t.nationalId})`:''}، شاغل الوحدة رقم (${t.unit||'—'}) بعقار ${p.name}${p.address?` — ${p.address}`:''}.

    closeModal:()=>{state.ui.modal=null;state.ui.doc=null;render();},
    copyDoc:()=>{navigator.clipboard&&navigator.clipboard.writeText(state.ui.doc.body);},
    printDoc:()=>{const w=window.open('','_blank');w.document.write('<pre dir="rtl" style="font-family:sans-serif;white-space:pre-wrap;padding:24px;line-height:1.9">'+state.ui.doc.body.replace(/</g,'&lt;')+'</pre>');w.document.close();w.print();},
    // جمعيات
    selAssoc:()=>{},newAssoc:()=>{state.ui.modal='newAssoc';render();},setAssoc:()=>{state.ui.modal='setAssoc';render();},
    createAssoc:()=>{const d=readAssoc();if(!d.name){alert('أدخل اسم الجمعية');return;}assocAdd({id:uid(),...d,owners:[],notes:[]});},
    saveAssoc:()=>{const d=readAssoc();if(!d.name)return;assocUpdate(d);},deleteAssoc:assocDelete,
    seedAssoc, ownerAdd, ownerPay:()=>ownerPay(id),ownerDue:()=>ownerDue(id),ownerDel:()=>ownerDel(id),
    ownerRemind:()=>ownerRemind(id),ownerNotice:()=>ownerNotice(id),assocRenew,assocNote,assocNoteDel:()=>assocNoteDel(id),
    // أملاك
    selProp:()=>{},newProp:()=>{state.ui.modal='newProp';render();},setProp:()=>{state.ui.modal='setProp';render();},
    createProp:()=>{const d=readProp();if(!d.name){alert('أدخل اسم العقار');return;}propAdd({id:uid(),...d,collected:0,tenants:[],notes:[]});},
    saveProp:()=>{const d=readProp();if(!d.name)return;propUpdate(d);},deleteProp:propDelete,
    seedProp, newTenant:()=>{state.ui.modal={tenant:true};render();},
    tenantEdit:()=>{state.ui.modal={editTenant:id};render();},saveTenant:tenantSave,
    tenantPay:()=>tenantPay(id),tenantDue:()=>tenantDue(id),tenantDel:()=>tenantDel(id),
    tenantRemind:()=>tenantRemind(id),tenantNotice:()=>tenantNotice(id),propNote,propNoteDel:()=>propNoteDel(id),
  };
  if(M[act]) M[act]();
});
document.addEventListener('change',e=>{
  const a=e.target.closest('[data-act="selAssoc"]'); if(a){state.activeAssoc=a.value;commit();return;}
  const p=e.target.closest('[data-act="selProp"]'); if(p){state.activeProp=p.value;commit();return;}
});
document.addEventListener('keydown',e=>{
  if(e.key!=='Enter')return;
  if(['oName','oUnit','oPhone'].includes(e.target.id)) ownerAdd();
  if(e.target.id==='aNote') assocNote();
  if(e.target.id==='pNote') propNote();
});

/* ============================ إقلاع ============================ */
(async()=>{ await load();
  const h=(location.hash||'').replace('#','');
  if(h==='property'||h==='association') state.mode=h;
  render(); })();
</script>
</body>
</html>
