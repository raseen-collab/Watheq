<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%230E3A37'/%3E%3Ctext x='32' y='45' font-size='38' text-anchor='middle' fill='%23E7C877' font-weight='bold' font-family='Arial'%3E%D9%88%3C/text%3E%3C/svg%3E">
<title>وثيق — لوحة التحكم (معاينة)</title>
<meta name="description" content="جرّب لوحة تحكم وثيق مباشرة: محرّك عقود تلقائي، دورات سداد مرنة، وإشارات مرور للتحصيل — بلا تسجيل.">
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Readex+Pro:wght@400;500;600;700&family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0B211F; --deep:#0E3A37; --deep-2:#0A2C2A;
    --paper:#FBF8F1; --paper-2:#F3EEE2; --card:#FFFFFF;
    --line:#E4DDCD; --muted:#5C6B67;
    --gold:#B8791F; --gold-ink:#8a5a11; --gold-soft:#E7C877;
    --paid:#1E9E6A; --late:#D0453F;
    --paid-bg:#E6F4EC; --late-bg:#FBE9E7; --amber-bg:#FBF1DF;
    --radius:14px;
    --shadow:0 1px 2px rgba(11,33,31,.04), 0 10px 26px -16px rgba(11,33,31,.28);
    --shadow-lg:0 24px 60px -28px rgba(11,33,31,.42);
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--paper);color:var(--ink);font-family:"IBM Plex Sans Arabic",system-ui,sans-serif;line-height:1.6;-webkit-font-smoothing:antialiased}
  h1,h2,h3{font-family:"Readex Pro","IBM Plex Sans Arabic",sans-serif}
  button{font-family:inherit;cursor:pointer}
  input,select{font-family:inherit}
  a{color:inherit;text-decoration:none}
  .wrap{max-width:1060px;margin:0 auto;padding:0 18px}

  /* ===== شريط علوي ===== */
  .top{background:var(--deep);color:#EAF1EE}
  .top .row{display:flex;align-items:center;justify-content:space-between;gap:14px;min-height:64px;flex-wrap:wrap;padding:10px 0}
  .brand{display:flex;align-items:center;gap:10px;font-family:"Readex Pro";font-weight:700;font-size:1.2rem}
  .seal{width:32px;height:32px;border-radius:9px;background:linear-gradient(150deg,#12403c,#0A2C2A);display:grid;place-items:center;box-shadow:inset 0 0 0 1.5px rgba(231,200,119,.4);flex:none}
  .seal::after{content:"و";color:var(--gold-soft);font-family:"Readex Pro";font-weight:700}
  .brand small{display:block;font-family:"IBM Plex Sans Arabic";font-weight:400;font-size:.7rem;color:#9FB8B3;margin-top:-2px}

  /* مبدّل الوضع */
  .modeseg{display:inline-flex;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.16);border-radius:12px;padding:4px}
  .modeseg button{border:0;background:transparent;color:#CFE0DB;font-weight:600;font-size:.9rem;padding:8px 16px;border-radius:9px;transition:background .18s ease,color .18s ease}
  .modeseg button.on{background:var(--gold-soft);color:#0A2C2A}

  /* ===== أزرار ===== */
  .btn{display:inline-flex;align-items:center;gap:7px;font-weight:600;font-size:.9rem;padding:9px 16px;border-radius:10px;border:1px solid transparent;transition:transform .12s ease, background .18s ease, box-shadow .2s ease;white-space:nowrap}
  .btn:active{transform:translateY(1px)}
  .btn-primary{background:var(--deep);color:#F6F1E4}
  .btn-primary:hover{background:var(--deep-2)}
  .btn-gold{background:var(--gold);color:#fff}
  .btn-gold:hover{background:var(--gold-ink)}
  .btn-ghost{background:var(--card);color:var(--deep);border-color:var(--line)}
  .btn-ghost:hover{background:var(--paper-2)}
  .btn-wa{background:#1FA855;color:#fff}
  .btn-wa:hover{background:#18944a}
  .btn-sm{padding:6px 11px;font-size:.8rem;border-radius:8px}
  .btn-icon{padding:6px 9px;font-size:.85rem;background:transparent;border:1px solid var(--line);color:var(--muted);border-radius:8px}
  .btn-icon:hover{background:var(--paper-2);color:var(--late)}

  main{padding:20px 0 64px}

  /* شريط أدوات (اختيار الكيان) */
  .toolbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:20px}
  .toolbar .sel{background:var(--card);color:var(--deep);border:1px solid var(--line);border-radius:10px;padding:9px 13px;font-size:.92rem;font-weight:600;max-width:260px}
  .toolbar .title{font-family:"Readex Pro";font-weight:700;font-size:1.25rem;color:var(--deep);margin-inline-end:auto}
  .toolbar .title small{display:block;font-family:"IBM Plex Sans Arabic";font-weight:400;font-size:.8rem;color:var(--muted)}

  /* تنبيهات */
  .alert{display:flex;align-items:center;gap:12px;flex-wrap:wrap;border-radius:12px;padding:13px 16px;font-size:.94rem;font-weight:500;margin-bottom:18px}
  .alert.amber{background:var(--amber-bg);border:1px solid rgba(184,121,31,.3);color:var(--gold-ink)}
  .alert.red{background:var(--late-bg);border:1px solid rgba(208,69,63,.3);color:#8f2b26}
  .alert b{font-weight:700}
  .alert .ico{font-size:1.15rem}
  .alert .btn{margin-inline-start:auto;flex:none}

  /* إحصاءات */
  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:18px;box-shadow:var(--shadow)}
  .stat .v{font-family:"Readex Pro";font-weight:700;font-size:1.85rem;color:var(--deep);line-height:1}
  .stat .v.warn{color:var(--late)}
  .stat .v.ok{color:var(--paid)}
  .stat .lbl{color:var(--muted);font-size:.83rem;margin-top:7px}

  /* لوحات */
  .grid2{display:grid;grid-template-columns:1.6fr 1fr;gap:20px;align-items:start}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
  .panel-h{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:15px 18px;border-bottom:1px solid var(--line)}
  .panel-h h2{margin:0;font-size:1.05rem;font-weight:600}
  .panel-h .count{color:var(--muted);font-size:.82rem;font-weight:400}
  .panel-b{padding:14px 18px 18px}

  /* صف إضافة (جمعيات) */
  .addrow{display:grid;grid-template-columns:1.4fr .7fr 1fr auto;gap:8px;margin-bottom:14px}
  .fld{background:var(--paper);border:1px solid var(--line);border-radius:9px;padding:9px 11px;font-size:.88rem;width:100%;color:var(--ink)}
  .fld:focus{outline:2px solid var(--gold-soft);outline-offset:1px}

  /* صف كيان (مالك/مستأجر) */
  .row-item{display:flex;align-items:center;gap:12px;padding:11px 12px;border:1px solid var(--line);border-radius:11px;margin-bottom:9px;background:var(--paper)}
  .row-item .av{width:36px;height:36px;border-radius:9px;background:var(--paper-2);display:grid;place-items:center;font-weight:600;color:var(--deep);flex:none}
  .row-item .meta{flex:1;min-width:0}
  .row-item .meta .n{font-weight:600;font-size:.94rem}
  .row-item .meta .u{color:var(--muted);font-size:.78rem}
  .pay{display:inline-flex;align-items:center;gap:6px;font-size:.8rem;font-weight:600;padding:5px 10px;border-radius:8px;white-space:nowrap}
  .pay .d{width:7px;height:7px;border-radius:50%}
  .pay.ok{background:var(--paid-bg);color:#137a50}.pay.ok .d{background:var(--paid)}
  .pay.late{background:var(--late-bg);color:#a5322c}.pay.late .d{background:var(--late)}
  .pay.soon{background:var(--amber-bg);color:var(--gold-ink)}.pay.soon .d{background:var(--gold)}
  .row-item .acts{display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end}

  /* ملاحظات */
  .note{padding:11px 0;border-bottom:1px dashed var(--line);font-size:.9rem;display:flex;gap:10px}
  .note:last-child{border-bottom:0}
  .note .dt{color:var(--gold-ink);font-weight:600;font-size:.74rem;flex:none;width:74px}
  .note .tx{color:#33413d;flex:1}
  .note .x{color:var(--muted);cursor:pointer;font-size:.9rem;opacity:.5}
  .note .x:hover{opacity:1;color:var(--late)}
  .note-add{display:flex;gap:8px;margin-bottom:14px}
  .empty{text-align:center;color:var(--muted);padding:26px 10px;font-size:.9rem}

  /* onboarding + modal */
  .overlay{position:fixed;inset:0;background:rgba(11,33,31,.5);backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px);display:grid;place-items:center;padding:18px;z-index:100}
  .modal{background:var(--card);border-radius:18px;box-shadow:var(--shadow-lg);width:100%;max-width:480px;padding:26px;max-height:90vh;overflow:auto}
  .modal h2{margin:0 0 4px;font-size:1.3rem;color:var(--deep)}
  .modal p.sub{margin:0 0 18px;color:var(--muted);font-size:.9rem}
  .field{margin-bottom:13px}
  .field.two{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .field label{display:block;font-size:.85rem;font-weight:600;margin-bottom:6px;color:var(--ink)}
  .modal-actions{display:flex;gap:10px;margin-top:20px}
  .modal-actions .btn{flex:1;justify-content:center}
  .link-btn{background:none;border:0;color:var(--gold-ink);font-weight:600;font-size:.86rem;text-decoration:underline;padding:6px}
  .onboard{max-width:520px;margin:44px auto;background:var(--card);border:1px solid var(--line);border-radius:20px;box-shadow:var(--shadow-lg);padding:34px;text-align:center}
  .onboard .seal{width:52px;height:52px;margin:0 auto 16px;font-size:1.3rem}
  .onboard h2{margin:0 0 8px;color:var(--deep)}
  .onboard p{color:var(--muted);margin:0 0 22px}

  /* نافذة الإنذار */
  .doc{white-space:pre-wrap;border:1px solid var(--line);background:var(--paper);border-radius:12px;padding:16px;font-size:.9rem;line-height:1.9;color:var(--ink);max-height:52vh;overflow:auto}
  .disc{font-size:.76rem;color:var(--gold-ink);margin:2px 0 12px}

  .freqgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}
  .freqbtn{border:2px solid var(--line);background:var(--card);border-radius:9px;padding:9px 4px;font-size:.78rem;font-weight:600;color:var(--ink);transition:all .15s ease}
  .freqbtn:hover{border-color:var(--gold-soft)}
  .freqbtn.on{border-color:var(--gold);background:var(--amber-bg);color:var(--gold-ink)}
  .ptgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}
  .ptbtn{border:2px solid var(--line);background:var(--card);border-radius:10px;padding:10px 4px;font-size:.72rem;font-weight:600;color:var(--ink);transition:all .15s ease}
  .ptbtn span{display:block;font-size:1.15rem;margin-bottom:3px}
  .ptbtn:hover{border-color:var(--gold-soft)}
  .ptbtn.on{border-color:var(--gold);background:var(--amber-bg);color:var(--gold-ink)}
  .pfbar{background:var(--deep);color:#EAF1EE;border-radius:14px;padding:13px 16px;margin-bottom:18px;display:flex;flex-wrap:wrap;align-items:center;gap:18px}
  .pfbar .ttl{font-family:"Readex Pro";font-weight:700;font-size:.82rem;color:var(--gold-soft)}
  .pfbar b{font-family:"Readex Pro";font-size:1.05rem;display:block;line-height:1.2}
  .pfbar small{color:#9FB8B3;font-size:.68rem}
  .pfbar .r b{color:#F5A9A4}
  .pay.soon{background:var(--amber-bg);color:var(--gold-ink)}.pay.soon .d{background:var(--gold)}
  .upsell{margin-top:20px;background:var(--amber-bg);border:1px solid rgba(184,121,31,.3);color:var(--gold-ink);border-radius:12px;padding:13px 16px;font-size:.86rem;text-align:center}
  .upsell a{color:var(--gold-ink);font-weight:700;text-decoration:underline}
  .foot{text-align:center;color:var(--muted);font-size:.8rem;margin-top:34px}
  .cloudbar{background:var(--amber-bg);border-bottom:1px solid rgba(184,121,31,.25);color:var(--gold-ink);font-size:.85rem;text-align:center;padding:8px 14px}
  .cloudbar a{color:var(--gold-ink);font-weight:700;text-decoration:underline}
  .badge-soon{display:inline-block;background:var(--amber-bg);color:var(--gold-ink);font-size:.72rem;font-weight:700;padding:3px 10px;border-radius:999px;border:1px solid rgba(184,121,31,.3)}

  @media(max-width:820px){
    .stats{grid-template-columns:1fr 1fr}
    .grid2{grid-template-columns:1fr}
    .addrow{grid-template-columns:1fr 1fr}
    .brand small{display:none}
    .toolbar .title{width:100%;margin-inline-end:0}
    .field.two{grid-template-columns:1fr}
  }
</style>
</head>
<body>

<header class="top">
  <div class="wrap row">
    <a href="index.html" class="brand" title="العودة إلى الموقع"><span class="seal"></span><div>وثيق<small id="brandSub">لوحة التحكم</small></div></a>
    <div class="modeseg" id="modeSeg">
      <button data-mode="association">جمعيات الملاك</button>
      <button data-mode="property">إدارة الأملاك</button>
    </div>
  </div>
</header>

<div class="cloudbar">معاينة سريعة — بياناتك هنا محفوظة على هذا الجهاز فقط. <a href="https://watheq-app.vercel.app" target="_blank" rel="noreferrer">ابدأ تجربة ٣٠ يومًا مجانًا لحفظها سحابيًّا ←</a></div>

<main class="wrap" id="app"></main>

<script>
/* ============================ التخزين ============================ */
const KEY = "watheq_app_v2";
const mem = {};
const store = {
  async get(k){ if(window.storage){try{return await window.storage.get(k)}catch(e){return null}} try{const v=localStorage.getItem(k);return v?{key:k,value:v}:null}catch(e){return mem[k]?{key:k,value:mem[k]}:null} },
  async set(k,v){ if(window.storage){try{return await window.storage.set(k,v)}catch(e){}return} try{localStorage.setItem(k,v)}catch(e){mem[k]=v} }
};

let state = {
  mode: "association",
  associations: [], activeAssoc: null,
  properties: [], activeProp: null,
  ui: { modal: null, doc: null }
};

async function load(){
  const r = await store.get(KEY);
  if(r&&r.value){ try{ const s=JSON.parse(r.value); Object.assign(state, s); state.ui={modal:null,doc:null}; }catch(e){} }
  if(state.associations.length && !assoc()) state.activeAssoc=state.associations[0].id;
  if(state.properties.length && !prop()) state.activeProp=state.properties[0].id;
}
async function save(){
  const {ui, ...persist} = state;
  await store.set(KEY, JSON.stringify(persist));
}
async function commit(){ await save(); render(); }


/* ============ محرّك العقود — مطابق للتطبيق السحابي ============ */
const FREQS=[{v:'daily',l:'يومي',s:'يوم'},{v:'weekly',l:'أسبوعي',s:'أسبوع'},{v:'monthly',l:'شهري',s:'شهر'},
             {v:'quarterly',l:'كل ٣ أشهر',s:'٣ أشهر'},{v:'semiannual',l:'كل ٦ أشهر',s:'٦ أشهر'},{v:'annual',l:'سنوي',s:'سنة'}];
const PER_YEAR={daily:365,weekly:52,monthly:12,quarterly:4,semiannual:2,annual:1};
const PER_MONTH={daily:30,weekly:4.33,monthly:1,quarterly:1/3,semiannual:1/6,annual:1/12};
const freqL=f=>(FREQS.find(x=>x.v===f)||FREQS[2]).l;
const freqS=f=>(FREQS.find(x=>x.v===f)||FREQS[2]).s;
const sod=d=>new Date(d.getFullYear(),d.getMonth(),d.getDate());

function addPeriods(date,freq,n){
  const d=new Date(date.getTime());
  if(freq==='daily') d.setDate(d.getDate()+n);
  else if(freq==='weekly') d.setDate(d.getDate()+n*7);
  else{
    const m=freq==='monthly'?1:freq==='quarterly'?3:freq==='semiannual'?6:12;
    const day=d.getDate(); d.setDate(1); d.setMonth(d.getMonth()+m*n);
    const last=new Date(d.getFullYear(),d.getMonth()+1,0).getDate();
    d.setDate(Math.min(day,last));
  }
  return d;
}
function periodsElapsed(startISO,freq){
  if(!startISO) return 0;
  const st=sod(new Date(startISO)), t=sod(new Date());
  if(t<st) return 0;
  let n=0; while(addPeriods(st,freq,n)<=t && n<5000) n++;
  return n;
}
const defaultTerm=f=>PER_YEAR[f]||12;
function derivedEnd(startISO,freq,periods){
  const n=periods&&periods>0?periods:defaultTerm(freq);
  return addPeriods(sod(new Date(startISO)),freq,n).toISOString().slice(0,10);
}
const daysBtw=(a,b)=>Math.ceil((sod(a)-sod(b))/86400000);

function contractState(t){
  const freq=t.freq||'monthly', rent=Number(t.rentAmount)||0, paid=Math.max(0,Number(t.paidPeriods)||0), now=new Date();
  if(!t.contractStart) return {due:0,paid,unpaid:0,amountDue:0,nextDueDate:null,daysToNextDue:null,endDate:t.contractEnd||null,daysToEnd:null,status:'ok',statusLabel:'بانتظار بيانات العقد'};
  const st=sod(new Date(t.contractStart));
  const due=periodsElapsed(t.contractStart,freq), unpaid=Math.max(0,due-paid), amountDue=unpaid*rent;
  const nextDue=addPeriods(st,freq,paid), nextDueDate=nextDue.toISOString().slice(0,10), daysToNextDue=daysBtw(nextDue,now);
  const endDate=t.contractEnd||derivedEnd(t.contractStart,freq,t.periods);
  const daysToEnd=daysBtw(new Date(endDate),now);
  let status='ok',statusLabel='منتظم';
  if(unpaid>0){status='late';statusLabel=unpaid===1?'متأخر دفعة واحدة':`متأخر ${unpaid} دفعات`;}
  else if(daysToNextDue<=7) status='soon',statusLabel=daysToNextDue<=0?'يستحق اليوم':`يستحق خلال ${daysToNextDue} يوم`;
  return {due,paid,unpaid,amountDue,nextDueDate,daysToNextDue,endDate,daysToEnd,status,statusLabel};
}
function buildSchedule(t){
  if(!t.contractStart) return [];
  const freq=t.freq||'monthly', st=sod(new Date(t.contractStart));
  const total=t.periods&&t.periods>0?t.periods:defaultTerm(freq);
  const paid=Math.max(0,Number(t.paidPeriods)||0), rent=Number(t.rentAmount)||0, today0=sod(new Date());
  return Array.from({length:Math.min(total,200)},(_,i)=>{
    const d=addPeriods(st,freq,i);
    return {n:i+1,date:d.toISOString().slice(0,10),amount:rent,status:i<paid?'paid':(d<=today0?'late':'upcoming')};
  });
}
function renewContract(t,opts){
  opts=opts||{};
  const freq=opts.freq||t.freq||'monthly', st=contractState(t);
  const start=st.endDate||new Date().toISOString().slice(0,10);
  const periods=opts.periods&&opts.periods>0?opts.periods:(t.periods||defaultTerm(freq));
  const amount=opts.amount&&opts.amount>0?opts.amount:(Number(t.rentAmount)||0);
  return {contractStart:start,contractEnd:derivedEnd(start,freq,periods),freq,periods,rentAmount:amount,paidPeriods:0};
}
const needsRenewal=t=>{const s=contractState(t);return s.daysToEnd!==null&&s.daysToEnd<=60;};

/* أنواع العقارات */
const PTYPES=[{v:'residential',l:'عمارة سكنية',u:'شقة',e:'🏢'},{v:'showroom',l:'معرض تجاري',u:'معرض',e:'🏬'},
  {v:'office',l:'مبنى مكاتب',u:'مكتب',e:'🏛️'},{v:'warehouse',l:'مستودع',u:'مستودع',e:'🏭'},
  {v:'villa',l:'فيلا / فلل',u:'فيلا',e:'🏡'},{v:'land',l:'أرض',u:'قطعة',e:'🗺️'}];
const ptL=t=>(PTYPES.find(x=>x.v===t)||PTYPES[0]).l;
const ptU=t=>(PTYPES.find(x=>x.v===t)||PTYPES[0]).u;
const ptE=t=>(PTYPES.find(x=>x.v===t)||PTYPES[0]).e;

/* ============================ أدوات ============================ */
const uid=()=>Math.random().toString(36).slice(2,9);
const esc=s=>String(s??"").replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const money=n=>(Number(n)||0).toLocaleString('en-US');
const today=()=>new Date().toISOString().slice(0,10);
function daysLeft(d){ if(!d) return null; return Math.ceil((new Date(d)-new Date(new Date().toDateString()))/86400000); }
function waNum(p){ p=(p||'').replace(/\D/g,''); if(!p)return''; if(p.startsWith('966'))return p; if(p.startsWith('0'))return'966'+p.slice(1); if(p.length===9)return'966'+p; return p; }
function openWa(phone,msg){ window.open(`https://wa.me/${waNum(phone)}?text=${encodeURIComponent(msg)}`,'_blank'); }

/* حساب أيام حتى استحقاق الشهر القادم (يوم 1 من كل شهر افتراضيًّا) */
function daysUntilDue(dueDay){
  dueDay=dueDay||1;
  const now=new Date(), y=now.getFullYear(), m=now.getMonth();
  let next=new Date(y,m,dueDay);
  if(next<=now) next=new Date(y,m+1,dueDay);
  return Math.ceil((next-now)/86400000);
}

    const opts=state.properties.map(p=>`<option value="${p.id}" ${p.id===state.activeProp?'selected':''}>${esc(p.name)}</option>`).join('');
    const p=prop();
    return `<div class="toolbar"><div class="title">${p?esc(p.name):'العقارات'}<small>إدارة الأملاك والمستأجرين</small></div>
      <select class="sel" data-act="selProp">${opts}</select>
      <button class="btn btn-ghost btn-sm" data-act="setProp">⚙︎ إعدادات</button>
      <button class="btn btn-gold btn-sm" data-act="newProp">+ عقار</button></div>`;
  }
}

function renderAssociation(){
  const a=assoc();
  if(!a){ return `<div class="onboard"><span class="seal"></span><h2>ابدأ بإضافة جمعيتك</h2><p>أدر ملّاك جمعيتك، حالات السداد، ورصيد الصندوق من مكان واحد.</p><button class="btn btn-gold" data-act="newAssoc">+ إنشاء جمعية</button><div style="margin-top:14px"><button class="link-btn" data-act="seedAssoc">أو جرّب ببيانات تجريبية</button></div></div>`; }
  const total=a.owners.length, late=a.owners.filter(o=>o.monthsLate>0), pct=total?Math.round((total-late.length)/total*100):0, dl=daysLeft(a.certExpiry);
  let alert='';
  if(dl!==null&&dl<0) alert=`<div class="alert red"><span class="ico">🔴</span><span><b>انتهت شهادة الجمعية.</b> بادر بالتجديد فورًا.</span><button class="btn btn-gold btn-sm" data-act="assocRenew">جهّز مستندات التجديد</button></div>`;
  else if(dl!==null&&dl<=60) alert=`<div class="alert ${dl<=30?'red':'amber'}"><span class="ico">${dl<=30?'🔴':'⚠️'}</span><span><b>تنتهي شهادة الجمعية خلال ${dl} يومًا</b> (${a.certExpiry}). جهّز محضر التجديد والموازنة الآن.</span><button class="btn btn-gold btn-sm" data-act="assocRenew">جهّز مستندات التجديد</button></div>`;
  const stats=`<div class="stats">
    <div class="stat"><div class="v ok">${pct}٪</div><div class="lbl">نسبة السداد</div></div>
    <div class="stat"><div class="v ${late.length?'warn':''}">${late.length}</div><div class="lbl">ملاك متأخرون</div></div>
    <div class="stat"><div class="v">${money(a.fundBalance)}</div><div class="lbl">رصيد الصندوق (ريال)</div></div>
    <div class="stat"><div class="v ${dl!==null&&dl<=30?'warn':''}">${dl===null?'—':dl}</div><div class="lbl">يوم حتى انتهاء الشهادة</div></div></div>`;
  const owners=total?a.owners.map(o=>{const l=o.monthsLate>0;return `<div class="row-item">
    <span class="av">${esc((o.name||'?').trim().charAt(0))}</span>
    <span class="meta"><span class="n">${esc(o.name)}</span><span class="u">${o.unit?'وحدة '+esc(o.unit):'—'}${o.phone?' · '+esc(o.phone):''}</span></span>
    ${statusBadge(o.monthsLate)}
    <span class="acts">
      <button class="btn btn-ghost btn-sm" data-act="ownerPay" data-id="${o.id}">سجّل دفعة</button>
      <button class="btn btn-ghost btn-sm" data-act="ownerDue" data-id="${o.id}">+ استحقاق</button>
      ${l?`<button class="btn btn-wa btn-sm" data-act="ownerRemind" data-id="${o.id}">تذكير</button>`:''}
      ${o.monthsLate>=2?`<button class="btn btn-gold btn-sm" data-act="ownerNotice" data-id="${o.id}">إنذار رسمي</button>`:''}
      <button class="btn-icon" data-act="ownerDel" data-id="${o.id}" title="حذف">✕</button>
    </span></div>`;}).join(''):`<div class="empty">لا يوجد ملّاك بعد — أضف أول مالك بالأعلى.</div>`;
  const notes=a.notes.length?a.notes.map(n=>`<div class="note"><span class="dt">${n.date}</span><span class="tx">${esc(n.text)}</span><span class="x" data-act="assocNoteDel" data-id="${n.id}">✕</span></div>`).join(''):`<div class="empty">لا ملاحظات بعد.</div>`;
  return alert+stats+`<div class="grid2">
    <div class="panel"><div class="panel-h"><h2>الملّاك وحالة السداد <span class="count">· ${total} من ${a.units||total} وحدة</span></h2></div>
      <div class="panel-b"><div class="addrow">
        <input class="fld" id="oName" placeholder="اسم المالك"><input class="fld" id="oUnit" placeholder="الوحدة"><input class="fld" id="oPhone" placeholder="جوال (اختياري)">
        <button class="btn btn-gold" data-act="ownerAdd">إضافة</button></div>${owners}</div></div>
    <div class="panel"><div class="panel-h"><h2>سجل العمارة</h2></div>
      <div class="panel-b"><div class="note-add"><input class="fld" id="aNote" placeholder="أضف ملاحظة (صيانة، تغيّر مالك…)"><button class="btn btn-primary btn-sm" data-act="assocNote">حفظ</button></div>${notes}</div></div>
  </div>`;
}

function renderProperty(){
  const p=prop();
  if(!p){ return `<div class="onboard"><span class="seal"></span><h2>ابدأ بإضافة عقارك</h2><p>عمارة، معرض تجاري، مكتب، مستودع، فيلا، أو أرض — كلها مدعومة.</p><button class="btn btn-gold" data-act="newProp">+ إنشاء عقار</button><div style="margin-top:14px"><button class="link-btn" data-act="seedProp">أو جرّب ببيانات تجريبية</button></div></div>`; }
  const ul=ptU(p.propertyType);
  const rows=p.tenants.map(t=>({t,st:contractState(t)}));
  const late=rows.filter(x=>x.st.status==='late'), soon=rows.filter(x=>x.st.status==='soon');
  const overdue=late.reduce((s,x)=>s+x.st.amountDue,0);
  const pct=rows.length?Math.round((rows.length-late.length)/rows.length*100):100;
  const expiring=rows.filter(x=>x.st.daysToEnd!==null&&x.st.daysToEnd<=60&&x.st.daysToEnd>=0).sort((a,b)=>a.st.daysToEnd-b.st.daysToEnd)[0];

  // شريط المحفظة (كل العقارات)
  let pf='';
  if(state.properties.length>1){
    const agg=state.properties.reduce((a,pr)=>{
      pr.tenants.forEach(t=>{const st=contractState(t);a.units++;
        if(st.status==='late'){a.late++;a.overdue+=st.amountDue;}
        if(st.status==='soon')a.soon++;
        if(st.daysToEnd!==null&&st.daysToEnd<=60&&st.daysToEnd>=0)a.exp++;
        a.monthly+=(Number(t.rentAmount)||0)*(PER_MONTH[t.freq||'monthly']||1);});
      return a;},{units:0,late:0,soon:0,overdue:0,exp:0,monthly:0});
    pf=`<div class="pfbar">
      <span class="ttl">محفظتك · ${state.properties.length} عقارات</span>
      <span><b>${agg.units}</b><small>وحدة</small></span>
      <span class="${agg.late?'r':''}"><b>${agg.late}</b><small>متأخرة</small></span>
      <span class="${agg.overdue?'r':''}"><b>${money(agg.overdue)}</b><small>ريال متأخر</small></span>
      <span><b>${agg.soon}</b><small>تستحق خلال ٧ أيام</small></span>
      <span><b>${agg.exp}</b><small>عقود تنتهي قريبًا</small></span>
      <span><b>${money(Math.round(agg.monthly))}</b><small>دخل شهري تقريبي</small></span>
    </div>`;
  }

  let alert='';
  if(expiring) alert=`<div class="alert ${expiring.st.daysToEnd<=30?'red':'amber'}"><span class="ico">📄</span><span><b>عقد ${esc(expiring.t.name)} (${ul} ${esc(expiring.t.unit||'—')}) ينتهي خلال ${expiring.st.daysToEnd} يومًا</b> (${expiring.st.endDate}). جهّز التجديد أو الإخلاء.</span></div>`;

  const stats=`<div class="stats">
    <div class="stat"><div class="v ok">${pct}٪</div><div class="lbl">نسبة الانتظام</div></div>
    <div class="stat"><div class="v ${late.length?'warn':''}">${late.length}</div><div class="lbl">وحدات متأخرة</div></div>
    <div class="stat"><div class="v ${overdue?'warn':''}">${money(overdue)}</div><div class="lbl">إجمالي المتأخر (ريال)</div></div>
    <div class="stat"><div class="v">${soon.length}</div><div class="lbl">دفعات خلال ٧ أيام</div></div></div>`;

  const list=rows.length?rows.map(({t,st})=>`<div class="row-item" style="flex-wrap:wrap">
    <span class="av">${esc((t.name||'?').trim().charAt(0))}</span>
    <span class="meta"><span class="n">${esc(t.name)}</span><span class="u">${ul} ${esc(t.unit||'—')} · ${money(t.rentAmount)} ريال / ${freqS(t.freq)}${st.unpaid===0&&st.nextDueDate?` · القادمة ${st.nextDueDate}`:''}${st.amountDue?` · متأخر ${money(st.amountDue)} ريال`:''}</span></span>
    <span class="pay ${st.status==='late'?'late':st.status==='soon'?'soon':'ok'}"><span class="d"></span> ${st.statusLabel}</span>
    <span class="acts">
      <button class="btn btn-ghost btn-sm" data-act="tenantPay" data-id="${t.id}">سجّل دفعة</button>
      ${(t.paidPeriods||0)>0?`<button class="btn btn-ghost btn-sm" data-act="tenantUndo" data-id="${t.id}">تراجع</button>`:''}
      <button class="btn btn-ghost btn-sm" data-act="tenantSchedule" data-id="${t.id}">الجدول</button>
      ${st.unpaid>0?`<button class="btn btn-wa btn-sm" data-act="tenantRemind" data-id="${t.id}">تذكير</button>`:''}
      ${st.unpaid>0?`<button class="btn btn-gold btn-sm" data-act="tenantNotice" data-id="${t.id}">نموذج إشعار</button>`:''}
      ${needsRenewal(t)?`<button class="btn btn-primary btn-sm" data-act="tenantRenew" data-id="${t.id}">تجديد العقد</button>`:''}
      <button class="btn-icon" data-act="tenantEdit" data-id="${t.id}" title="تعديل" style="color:var(--deep)">✎</button>
      <button class="btn-icon" data-act="tenantDel" data-id="${t.id}" title="حذف">✕</button>
    </span></div>`).join(''):`<div class="empty">لا توجد وحدات بعد — أضف أول وحدة.</div>`;

  const notes=p.notes.length?p.notes.map(n=>`<div class="note"><span class="dt">${n.date}</span><span class="tx">${esc(n.text)}</span><span class="x" data-act="propNoteDel" data-id="${n.id}">✕</span></div>`).join(''):`<div class="empty">لا ملاحظات بعد.</div>`;

  return pf+alert+stats+`<div class="grid2">
    <div class="panel"><div class="panel-h"><h2>الوحدات والمستأجرون <span class="count">· ${rows.length} ${ul}</span></h2><button class="btn btn-gold btn-sm" data-act="newTenant">+ وحدة</button></div>
      <div class="panel-b">${list}</div></div>
    <div class="panel"><div class="panel-h"><h2>سجل العقار</h2></div>
      <div class="panel-b"><div class="note-add"><input class="fld" id="pNote" placeholder="ملاحظة (صيانة، تجديد عقد…)"><button class="btn btn-primary btn-sm" data-act="propNote">حفظ</button></div>${notes}</div></div>
  </div>
  <div class="upsell">في النسخة الكاملة أيضًا: <b>رفع جماعي من Excel</b> · <b>كشوف حساب وفواتير PDF</b> · <b>تنبيهات تليجرام يومية</b> — <a href="https://watheq-app.vercel.app" target="_blank" rel="noreferrer">جرّبها مجانًا ٣٠ يومًا ←</a></div>`;
}

function render(){
  // مبدّل الوضع
  document.querySelectorAll('#modeSeg button').forEach(b=>b.classList.toggle('on', b.dataset.mode===state.mode));
  document.getElementById('brandSub').textContent = state.mode==='association'?'جمعيات الملاك':'إدارة الأملاك';
  const app=document.getElementById('app');
  const body = state.mode==='association'?renderAssociation():renderProperty();
  const hasEntity = state.mode==='association'?state.associations.length:state.properties.length;
  app.innerHTML = (hasEntity?toolbar():'') + body +
    `<div class="foot"><a href="index.html" style="color:var(--gold-ink);font-weight:600;text-decoration:underline">← العودة إلى الموقع الرئيسي</a><br><span style="display:block;max-width:560px;margin:8px auto 0;line-height:1.7">وثيق أداة تنظيمية تُنشئ <b>نماذج خطابات تذكير</b> تستخدمها بنفسك. لا نقدّم خدمات قانونية، ولا نرفع دعاوى، ولا نستلم أي مبالغ.<br><a href="https://t.me/+966550165210" target="_blank" rel="noreferrer" style="color:var(--gold-ink)">📨 تليجرام</a> · <a href="mailto:watheqdocs@gmail.com" style="color:var(--gold-ink)">✉️ watheqdocs@gmail.com</a></span></div>` + renderModal();
}

/* ============================ الأحداث ============================ */
document.addEventListener('click',e=>{
  const seg=e.target.closest('#modeSeg button'); if(seg){switchMode(seg.dataset.mode);return;}
  if(e.target.hasAttribute&&e.target.hasAttribute('data-close')){ state.ui.modal=null; state.ui.doc=null; render(); return; }
  // اختيار دورة السداد
  const fb=e.target.closest('[data-freq]');
  if(fb){ document.querySelectorAll('.freqbtn').forEach(x=>x.classList.remove('on')); fb.classList.add('on');
          const h=document.getElementById('tFreq'); if(h) h.value=fb.dataset.freq; updatePreview(); return; }
  // اختيار نوع العقار
  const pb=e.target.closest('[data-ptype]');
  if(pb){ document.querySelectorAll('.ptbtn').forEach(x=>x.classList.remove('on')); pb.classList.add('on');
          const h=document.getElementById('pfType'); if(h) h.value=pb.dataset.ptype; return; }
  const t=e.target.closest('[data-act]'); if(!t) return;
  const act=t.dataset.act, id=t.dataset.id;
  const M={
    // مشترك
    closeModal:()=>{state.ui.modal=null;state.ui.doc=null;render();},
    copyDoc:()=>{navigator.clipboard&&navigator.clipboard.writeText(state.ui.doc.body);},
    printDoc:()=>{const w=window.open('','_blank');w.document.write('<pre dir="rtl" style="font-family:sans-serif;white-space:pre-wrap;padding:24px;line-height:1.9">'+state.ui.doc.body.replace(/</g,'&lt;')+'</pre>');w.document.close();w.print();},
    // جمعيات
    selAssoc:()=>{},newAssoc:()=>{state.ui.modal='newAssoc';render();},setAssoc:()=>{state.ui.modal='setAssoc';render();},
    createAssoc:()=>{const d=readAssoc();if(!d.name){alert('أدخل اسم الجمعية');return;}assocAdd({id:uid(),...d,owners:[],notes:[]});},
    saveAssoc:()=>{const d=readAssoc();if(!d.name)return;assocUpdate(d);},deleteAssoc:assocDelete,
    seedAssoc, ownerAdd, ownerPay:()=>ownerPay(id),ownerDue:()=>ownerDue(id),ownerDel:()=>ownerDel(id),
    ownerRemind:()=>ownerRemind(id),ownerNotice:()=>ownerNotice(id),assocRenew,assocNote,assocNoteDel:()=>assocNoteDel(id),
    // أملاك
    selProp:()=>{},newProp:()=>{state.ui.modal='newProp';render();},setProp:()=>{state.ui.modal='setProp';render();},
    createProp:()=>{const d=readProp();if(!d.name){alert('أدخل اسم العقار');return;}propAdd({id:uid(),...d,collected:0,tenants:[],notes:[]});},
    saveProp:()=>{const d=readProp();if(!d.name)return;propUpdate(d);},deleteProp:propDelete,
    seedProp, newTenant:()=>{state.ui.modal={tenant:true};render();},
    tenantEdit:()=>{state.ui.modal={editTenant:id};render();},saveTenant:tenantSave,
    tenantPay:()=>tenantPay(id),tenantUndo:()=>tenantUndo(id),tenantDel:()=>tenantDel(id),
    tenantRenew:()=>tenantRenew(id),tenantSchedule:()=>tenantSchedule(id),
    tenantRemind:()=>tenantRemind(id),tenantNotice:()=>tenantNotice(id),propNote,propNoteDel:()=>propNoteDel(id),
  };
  if(M[act]) M[act]();
});
document.addEventListener('input',e=>{
  if(['tStart','tRent','tPeriods'].includes(e.target.id)) updatePreview();
});
document.addEventListener('change',e=>{
  const a=e.target.closest('[data-act="selAssoc"]'); if(a){state.activeAssoc=a.value;commit();return;}
  const p=e.target.closest('[data-act="selProp"]'); if(p){state.activeProp=p.value;commit();return;}
});
document.addEventListener('keydown',e=>{
  if(e.key!=='Enter')return;
  if(['oName','oUnit','oPhone'].includes(e.target.id)) ownerAdd();
  if(e.target.id==='aNote') assocNote();
  if(e.target.id==='pNote') propNote();
});

/* ============================ إقلاع ============================ */
(async()=>{ await load();
  const h=(location.hash||'').replace('#','');
  if(h==='property'||h==='association') state.mode=h;
  render(); })();
</script>
</body>
</html>
